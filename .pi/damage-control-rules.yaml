# Damage-control safety rules for Pi worker agents.
# Ported from disler/pi-vs-claude-code (MIT).
# https://github.com/disler/pi-vs-claude-code
#
# Rules are data-driven вЂ” edit this file to add/remove/tune patterns
# without touching the extension code.
#
# deny  = hard block + log reason to the agent
# ask   = confirmation prompt (user must approve before execution)
#
# Patterns are PCRE (used by the Node.js damage-control.ts extension).

bashToolPatterns:
  # в”Ђв”Ђ Destructive file operations в”Ђв”Ђ
  - pattern: '\brm\s+(?=.*-[^-]*[rR])(?=.*-[^-]*[fF]).*'
    reason: rm -rf (recursive force delete) вЂ” destructive, cannot undo
  - pattern: '\bsudo\s+rm\b'
    reason: sudo rm вЂ” privileged delete
  - pattern: '\bchmod\s+(-[^\s]*\s+)*777\b'
    reason: chmod 777 вЂ” world-writable permissions
  - pattern: '\bchmod\s+-[Rr].*777'
    reason: chmod -R 777 вЂ” recursive world-writable permissions
  - pattern: '\bchown\s+-[Rr].*\broot\b'
    reason: chown -R root вЂ” recursive ownership change to root

  # в”Ђв”Ђ Destructive git operations в”Ђв”Ђ
  - pattern: '\bgit\s+reset\s+--hard\b'
    reason: git reset --hard вЂ” destroys uncommitted work (use --soft or stash)
  - pattern: '\bgit\s+clean\s+.*-[fd]'
    reason: git clean -fd вЂ” force-deletes untracked files and directories
  - pattern: '\bgit\s+push\s+.*--force(?!-with-lease)'
    reason: git push --force вЂ” overwrites remote history (use --force-with-lease)
  - pattern: '\bgit\s+push\s+.*-f\b(?!.*--force-with-lease)'
    reason: git push -f вЂ” force-push shorthand (use --force-with-lease)
  - pattern: '\bgit\s+stash\s+clear\b'
    reason: git stash clear вЂ” deletes ALL stashes permanently
  - pattern: '\bgit\s+filter-branch\b'
    reason: git filter-branch вЂ” rewrites entire history, dangerous
  - pattern: '\bgit\s+push\s+\S+\s+--delete\b'
    reason: git push --delete вЂ” deletes remote branch
  - pattern: '\bgit\s+push\s+\S+\s+:\S+'
    reason: git push origin :branch вЂ” deletes remote branch (old syntax)

  # в”Ђв”Ђ Device / filesystem destruction в”Ђв”Ђ
  - pattern: '>\s*/dev/sd[a-z]'
    reason: redirect to /dev/sd* вЂ” writes to raw block device
  - pattern: '\bmkfs\.'
    reason: mkfs вЂ” filesystem creation, destroys existing data
  - pattern: '\bdd\s+.*of=/dev/'
    reason: dd of=/dev/ вЂ” writes directly to device

  # в”Ђв”Ђ Fork bombs в”Ђв”Ђ
  - pattern: ':\(\)\s*\{'
    reason: fork bomb вЂ” shell function that spawns unlimited processes
  - pattern: '\bperl\s+-e\s+.*fork'
    reason: potential perl fork bomb
  - pattern: '\bpython.*\bos\.fork'
    reason: potential python fork bomb

  # в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
  # ASK patterns (confirmation required, not hard-deny)
  # в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
  - pattern: '\bgit\s+reset\b(?!\s+(--soft|--hard|--merge|--keep|HEAD))'
    reason: git reset (bare) вЂ” may discard staged changes; verify intent
    ask: true
  - pattern: '\bgit\s+checkout\s+--\s*\.'
    reason: git checkout -- . вЂ” discards ALL uncommitted changes in working tree
    ask: true
  - pattern: '\bnpm\s+publish\b'
    reason: npm publish вЂ” publishes package to registry; confirm intent
    ask: true
  - pattern: '\brm\s+(?=.*-[^-]*[rR])(?!.*-[^-]*[fF]).*'
    reason: rm -r without -f вЂ” confirm recursive delete intent
    ask: true

# в”Ђв”Ђ Path-level protections в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Paths Pi workers must never read/write (zero-access).
zeroAccessPaths:
  - ".env"
  - ".env.local"
  - ".env.production"
  - ".env.staging"
  - "~/.ssh/"
  - "~/.gnupg/"
  - "~/.aws/"
  - "~/.config/gcloud/"
  - "*-credentials.json"
  - "*serviceAccount*.json"
  - "*.pem"
  - "*.key"
  - "*.p12"
  - "*.pfx"
  - "~/.netrc"
  - "~/.npmrc"
  - "~/.git-credentials"
  - ".git-credentials"

# Paths Pi workers may read but must not write.
readOnlyPaths:
  - /etc/
  - /usr/
  - /bin/
  - /sbin/
  - /boot/
  - "package-lock.json"
  - "yarn.lock"
  - "pnpm-lock.yaml"
  - "Gemfile.lock"
  - "Cargo.lock"
  - "go.sum"
  - "*.lock"
  - "*.lockb"
  - "*.min.js"
  - "*.min.css"
  - dist/
  - build/
  - .next/

# Paths Pi workers must not delete.
noDeletePaths:
  - "LICENSE"
  - "README.md"
  - "CHANGELOG.md"
  - "SECURITY.md"
  - "CONTRIBUTING.md"
  - .git/
  - .gitignore
  - .gitattributes
  - .github/
  - Dockerfile
  - docker-compose.yml
  - .dockerignore
